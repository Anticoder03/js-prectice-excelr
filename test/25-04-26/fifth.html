<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>hii</h2>
    <h2>hello</h2>
    <h2>hey</h2>
</body>
<script>
    let h2 = document.querySelectorAll('h2');
    h2.forEach(element => {
        element.style.color = "red";
    });
</script>
</html>
