<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p class="highlight">hello</p>
    <p class="highlight">hii</p>
    <p class="highlight">hey</p>
    <p class="highlight">hm</p>
    <p class="highlight">how are you</p>
</body>
<script>
    let h = document.getElementsByClassName('highlight');
    for(let i=0; i<h.length; i++){
        h[i].style.color = "blue";
    }
</script>
</html>
